blueprint:
  name: Lights controller
  description: >
    • Reacts to doors, motion, button presses, and a timer.

    • Optional bypass flag (input_boolean) that can be toggled by double-tap
      events or by a dedicated *Bypass action sensor* array.

    • The *Bypass action sensor* array watches any number of entities whose
      state can be "single", "double", "unknown" or "unavailable".
      - "single"  → enable bypass (turn ON the bypass boolean)
      - "double"  → disable bypass (turn OFF the bypass boolean)
      - other states are ignored.

    • Optional max-on safety shutoff: forces lights off after a configurable
      duration with an optional warning period and notification.

    • Optional fallback shutoff: forces lights off at a configurable time every night.

    • All steps use the modern `action:` syntax.

  source_url: "https://github.com/isaackehle/homeassistant/lights/lights_controller.yaml"
  domain: automation

  input:
    # ── Core sensors ──────────────────────────────────────────────────────────

    door_sensors:
      name: Door sensors
      description: >
        Binary sensors that detect when doors open/close. When any door opens,
        all lights turn on and the motion timer pauses. When the door closes,
        the timer resumes.
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: true
          reorder: false

    motion_sensors:
      name: Motion sensors
      description: >
        Binary sensors that detect occupancy/motion. When motion is detected
        the timer resets. Leave empty to rely only on door/button triggers.
      default: []
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: true
          reorder: false

    bypass_action_sensors:
      name: Bypass action sensors (optional)
      description: >
        Sensor/event entities whose state drives bypass toggling.
        "single" → ENABLE bypass. "double" → DISABLE bypass.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
          multiple: true
          reorder: false

    # ── Lights ────────────────────────────────────────────────────────────────

    toggle_entities:
      name: Toggle lights (simple on/off)
      description: Lights that only support on/off (no brightness control).
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
          reorder: false

    dimmer_entities:
      name: Dimmer lights
      description: Dimmable lights — set to 100 % brightness when turned on.
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
          reorder: false

    rgbw_entities:
      name: RGBW lights (color + white + brightness)
      description: Color lights with separate white channel. Set to 6500 K / 100 % on trigger.
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
          reorder: false

    rgb_entities:
      name: RGB lights (color + brightness only)
      description: Color lights without white channel. Set to white 255,255,255 / 100 % on trigger.
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
          reorder: false

    # ── Motion timer ──────────────────────────────────────────────────────────

    timer_entity:
      name: Motion timer
      description: >
        Timer that controls how long lights stay on after motion/door events.
        Create via Settings → Helpers → Timer.
      selector:
        entity:
          filter:
            - domain: timer
          multiple: false
          reorder: false

    timer_reset_duration:
      name: Timer reset duration
      description: "How long the timer stays active after each trigger. Format: HH:MM:SS"
      default: "00:20:00"
      selector:
        text:
          multiple: false
          multiline: false

    # ── Paddle events ─────────────────────────────────────────────────────────

    top_paddle_events:
      name: Top paddle event entities (optional)
      description: >
        Event entities fired when a top button/paddle is pressed.
        Single-tap → lights on. Double-tap → enables bypass.
      default: []
      selector:
        entity:
          filter:
            - domain: event
          multiple: true
          reorder: false

    bottom_paddle_events:
      name: Bottom paddle event entities (optional)
      description: >
        Event entities fired when a bottom button/paddle is pressed.
        Single-tap → lights off. Double-tap → disables bypass.
      default: []
      selector:
        entity:
          filter:
            - domain: event
          multiple: true
          reorder: false

    # ── Bypass helper ─────────────────────────────────────────────────────────

    bypass_boolean:
      name: Bypass helper input_boolean (optional)
      description: >
        When ON: lights won't turn off when the timer expires.
        Toggle via double-tap paddles, bypass_action_sensors, or manually.
        Leave empty to disable bypass logic.
      default: ""
      selector:
        entity:
          filter:
            - domain: input_boolean
          multiple: false
          reorder: false

    # ── Max-on safety shutoff ─────────────────────────────────────────────────

    max_on_timer:
      name: Max-on safety timer (optional)
      description: >
        A second timer used to enforce a maximum continuous on-time.
        When this timer expires the lights are forced off (after an optional
        warning period). Leave empty to disable max-on safety logic.
        Create via Settings → Helpers → Timer.
      default: ""
      selector:
        entity:
          filter:
            - domain: timer
          multiple: false
          reorder: false

    max_on_duration:
      name: Max-on duration
      description: >
        How long lights may stay on continuously before the safety shutoff
        triggers. Only used when a max_on_timer is configured.
        Format: HH:MM:SS  (default 1 hour)
      default: "01:00:00"
      selector:
        text:
          multiple: false
          multiline: false

    warning_timer:
      name: Warning timer entity (optional)
      description: >
        Timer used for the pre-shutoff warning window. When the max-on timer
        expires this timer starts; when it expires the lights turn off.
        Leave empty to skip the warning and shut off immediately.
        Create via Settings → Helpers → Timer.
      default: ""
      selector:
        entity:
          filter:
            - domain: timer
          multiple: false
          reorder: false

    warning_duration:
      name: Warning period duration
      description: >
        How long to wait after the max-on warning before forcing lights off.
        Only used when a warning_timer is configured.
        Format: HH:MM:SS  (default 5 minutes)
      default: "00:05:00"
      selector:
        text:
          multiple: false
          multiline: false

    extend_duration:
      name: Extend duration (when bottom paddle pressed during warning)
      description: >
        If the bottom paddle is pressed during the warning window the max-on
        timer is restarted with this duration instead of the original
        max_on_duration. Format: HH:MM:SS  (default 30 minutes)
      default: "00:30:00"
      selector:
        text:
          multiple: false
          multiline: false

    # ── Fallback shutoff ──────────────────────────────────────────────────────

    enable_fallback_shutoff:
      name: Enable fallback shutoff
      description: >
        When enabled, all lights are forced off at the configured time
        every night and all timers are cancelled.
      default: false
      selector:
        boolean:

    fallback_shutoff_time:
      name: Fallback shutoff time
      description: >
        Time of day to force lights off when fallback shutoff is enabled.
      default: "00:00:00"
      selector:
        time:

    # ── Notifications ─────────────────────────────────────────────────────────

    notification_service:
      name: Notification service (optional)
      description: >
        Service to call for max-on warnings and fallback shutoff messages,
        e.g. notify.notify or notify.mobile_app_isaac_iphone_16.
        Leave empty to skip notifications.
      default: ""
      selector:
        text:
          multiple: false
          multiline: false

    notification_title:
      name: Notification title prefix
      description: Prefix used in notification titles (e.g. "Basement").
      default: "Lights"
      selector:
        text:
          multiple: false
          multiline: false

# ── Triggers ──────────────────────────────────────────────────────────────────

trigger:
  - platform: state
    entity_id: !input door_sensors
    to: "on"
    id: door_opened

  - platform: state
    entity_id: !input door_sensors
    to: "off"
    id: door_closed

  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: motion_detected

  - platform: state
    entity_id: !input top_paddle_events
    id: top_single
    attribute: event_type
    to: "KeyPressed"

  - platform: state
    entity_id: !input top_paddle_events
    id: top_double
    attribute: event_type
    to: "KeyPressed2x"

  - platform: state
    entity_id: !input bottom_paddle_events
    id: bottom_single
    attribute: event_type
    to: "KeyPressed"

  - platform: state
    entity_id: !input bottom_paddle_events
    id: bottom_double
    attribute: event_type
    to: "KeyPressed2x"

  - platform: state
    entity_id: !input bypass_action_sensors
    to: "single"
    id: bypass_enable

  - platform: state
    entity_id: !input bypass_action_sensors
    to: "double"
    id: bypass_disable

  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: !input timer_entity
    id: motion_timer_expired

  # Max-on timer triggers
  - platform: state
    entity_id: !input toggle_entities
    to: "on"
    id: lights_turned_on

  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: !input max_on_timer
    id: max_on_timer_expired

  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: !input warning_timer
    id: warning_timer_expired

  # Fallback shutoff
  - platform: time
    at: !input fallback_shutoff_time
    id: fallback_shutoff

# ── Variables ─────────────────────────────────────────────────────────────────

variables:
  bypass_boolean: !input bypass_boolean
  max_on_timer: !input max_on_timer
  warning_timer: !input warning_timer
  notification_service: !input notification_service
  notification_title: !input notification_title
  enable_fallback_shutoff: !input enable_fallback_shutoff
  toggle_entities: !input toggle_entities
  dimmer_entities: !input dimmer_entities
  rgbw_entities: !input rgbw_entities
  rgb_entities: !input rgb_entities

# ── Mode ──────────────────────────────────────────────────────────────────────

mode: queued
max: 10

# ── Actions ───────────────────────────────────────────────────────────────────

action:
  - choose:

    # ── Door opened: lights on, pause motion timer ────────────────────────────
    - conditions:
        - condition: trigger
          id: door_opened
      sequence:
        - if:
            - condition: template
              value_template: "{{ toggle_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input toggle_entities
        - if:
            - condition: template
              value_template: "{{ dimmer_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input dimmer_entities
              data:
                brightness_pct: 100
        - if:
            - condition: template
              value_template: "{{ rgbw_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input rgbw_entities
              data:
                color_temp_kelvin: 6500
                brightness_pct: 100
        - if:
            - condition: template
              value_template: "{{ rgb_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input rgb_entities
              data:
                rgb_color: [255, 255, 255]
                brightness_pct: 100
        - action: timer.pause
          target:
            entity_id: !input timer_entity

    # ── Door closed: resume motion timer ─────────────────────────────────────
    - conditions:
        - condition: trigger
          id: door_closed
      sequence:
        - action: timer.start
          target:
            entity_id: !input timer_entity
          data:
            duration: !input timer_reset_duration

    # ── Motion detected: reset motion timer ───────────────────────────────────
    - conditions:
        - condition: trigger
          id: motion_detected
      sequence:
        - action: timer.start
          target:
            entity_id: !input timer_entity
          data:
            duration: !input timer_reset_duration

    # ── Top single: lights on ─────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: top_single
      sequence:
        - if:
            - condition: template
              value_template: "{{ toggle_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input toggle_entities
        - if:
            - condition: template
              value_template: "{{ dimmer_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input dimmer_entities
              data:
                brightness_pct: 100
        - if:
            - condition: template
              value_template: "{{ rgbw_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input rgbw_entities
              data:
                color_temp_kelvin: 6500
                brightness_pct: 100
        - if:
            - condition: template
              value_template: "{{ rgb_entities | length > 0 }}"
          then:
            - action: light.turn_on
              target:
                entity_id: !input rgb_entities
              data:
                rgb_color: [255, 255, 255]
                brightness_pct: 100
        - action: timer.start
          target:
            entity_id: !input timer_entity
          data:
            duration: !input timer_reset_duration

    # ── Top double: enable bypass ─────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: top_double
        - condition: template
          value_template: "{{ bypass_boolean != '' }}"
      sequence:
        - action: input_boolean.turn_on
          target:
            entity_id: !input bypass_boolean

    # ── Bottom single during warning window: extend ───────────────────────────
    - conditions:
        - condition: trigger
          id: bottom_single
        - condition: template
          value_template: >
            {{ warning_timer != '' and states(warning_timer) == 'active' }}
      sequence:
        - action: timer.start
          target:
            entity_id: !input max_on_timer
          data:
            duration: !input extend_duration
        - action: timer.cancel
          target:
            entity_id: !input warning_timer
        - if:
            - condition: template
              value_template: "{{ notification_service != '' }}"
          then:
            - action: "{{ notification_service }}"
              data:
                title: "{{ notification_title }} — extended"
                message: >
                  {{ notification_title }} lights extended for
                  {{ extend_duration }}.

    # ── Bottom single: lights off ─────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: bottom_single
      sequence:
        - action: light.turn_off
          target:
            entity_id: !input toggle_entities
        - if:
            - condition: template
              value_template: "{{ dimmer_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input dimmer_entities
        - if:
            - condition: template
              value_template: "{{ rgbw_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgbw_entities
        - if:
            - condition: template
              value_template: "{{ rgb_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgb_entities
        - action: timer.cancel
          target:
            entity_id: !input timer_entity
        - if:
            - condition: template
              value_template: "{{ max_on_timer != '' }}"
          then:
            - action: timer.cancel
              target:
                entity_id: !input max_on_timer
        - if:
            - condition: template
              value_template: "{{ warning_timer != '' }}"
          then:
            - action: timer.cancel
              target:
                entity_id: !input warning_timer

    # ── Bottom double: disable bypass ─────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: bottom_double
        - condition: template
          value_template: "{{ bypass_boolean != '' }}"
      sequence:
        - action: input_boolean.turn_off
          target:
            entity_id: !input bypass_boolean

    # ── Bypass enable (action sensor single) ──────────────────────────────────
    - conditions:
        - condition: trigger
          id: bypass_enable
        - condition: template
          value_template: "{{ bypass_boolean != '' }}"
      sequence:
        - action: input_boolean.turn_on
          target:
            entity_id: !input bypass_boolean

    # ── Bypass disable (action sensor double) ─────────────────────────────────
    - conditions:
        - condition: trigger
          id: bypass_disable
        - condition: template
          value_template: "{{ bypass_boolean != '' }}"
      sequence:
        - action: input_boolean.turn_off
          target:
            entity_id: !input bypass_boolean

    # ── Motion timer expired: check bypass, then turn off ─────────────────────
    - conditions:
        - condition: trigger
          id: motion_timer_expired
      sequence:
        - if:
            - condition: template
              value_template: >
                {{ bypass_boolean == '' or
                   states(bypass_boolean) == 'off' }}
          then:
            - action: light.turn_off
              target:
                entity_id: !input toggle_entities
            - if:
                - condition: template
                  value_template: "{{ dimmer_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input dimmer_entities
            - if:
                - condition: template
                  value_template: "{{ rgbw_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input rgbw_entities
            - if:
                - condition: template
                  value_template: "{{ rgb_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input rgb_entities

    # ── Lights turned on: start max-on timer ──────────────────────────────────
    - conditions:
        - condition: trigger
          id: lights_turned_on
        - condition: template
          value_template: "{{ max_on_timer != '' }}"
      sequence:
        - action: timer.start
          target:
            entity_id: !input max_on_timer
          data:
            duration: !input max_on_duration

    # ── Max-on timer expired: warn or shut off ────────────────────────────────
    - conditions:
        - condition: trigger
          id: max_on_timer_expired
        - condition: template
          value_template: "{{ max_on_timer != '' }}"
      sequence:
        - if:
            - condition: template
              value_template: "{{ warning_timer != '' }}"
          then:
            - if:
                - condition: template
                  value_template: "{{ notification_service != '' }}"
              then:
                - action: "{{ notification_service }}"
                  data:
                    title: "{{ notification_title }} — shutoff warning"
                    message: >
                      {{ notification_title }} lights will turn off in
                      {{ warning_duration }}. Press any bottom paddle to extend.
            - action: timer.start
              target:
                entity_id: !input warning_timer
              data:
                duration: !input warning_duration
          else:
            - action: light.turn_off
              target:
                entity_id: !input toggle_entities
            - if:
                - condition: template
                  value_template: "{{ dimmer_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input dimmer_entities
            - if:
                - condition: template
                  value_template: "{{ rgbw_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input rgbw_entities
            - if:
                - condition: template
                  value_template: "{{ rgb_entities | length > 0 }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: !input rgb_entities

    # ── Warning timer expired: force off ─────────────────────────────────────
    - conditions:
        - condition: trigger
          id: warning_timer_expired
        - condition: template
          value_template: "{{ warning_timer != '' }}"
      sequence:
        - if:
            - condition: template
              value_template: "{{ notification_service != '' }}"
          then:
            - action: "{{ notification_service }}"
              data:
                title: "{{ notification_title }} — turning off"
                message: "Turning off {{ notification_title }} lights now due to timeout."
        - action: light.turn_off
          target:
            entity_id: !input toggle_entities
        - if:
            - condition: template
              value_template: "{{ dimmer_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input dimmer_entities
        - if:
            - condition: template
              value_template: "{{ rgbw_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgbw_entities
        - if:
            - condition: template
              value_template: "{{ rgb_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgb_entities
        - action: timer.cancel
          target:
            entity_id: !input max_on_timer

    # ── Fallback shutoff ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: fallback_shutoff
        - condition: template
          value_template: "{{ enable_fallback_shutoff }}"
      sequence:
        - action: light.turn_off
          target:
            entity_id: !input toggle_entities
        - if:
            - condition: template
              value_template: "{{ dimmer_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input dimmer_entities
        - if:
            - condition: template
              value_template: "{{ rgbw_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgbw_entities
        - if:
            - condition: template
              value_template: "{{ rgb_entities | length > 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: !input rgb_entities
        - action: timer.cancel
          target:
            entity_id: !input timer_entity
        - if:
            - condition: template
              value_template: "{{ max_on_timer != '' }}"
          then:
            - action: timer.cancel
              target:
                entity_id: !input max_on_timer
        - if:
            - condition: template
              value_template: "{{ warning_timer != '' }}"
          then:
            - action: timer.cancel
              target:
                entity_id: !input warning_timer
        - if:
            - condition: template
              value_template: "{{ notification_service != '' }}"
          then:
            - action: "{{ notification_service }}"
              data:
                title: "{{ notification_title }} — fallback shutoff"
                message: "{{ notification_title }} lights turned off by fallback shutoff."